<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成项目图片素材</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #667eea; margin-bottom: 10px; }
    h2 { color: #333; border-bottom: 3px solid #667eea; padding-bottom: 10px; margin-top: 0; }
    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      color: white;
      font-weight: bold;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .preview-item {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      border: 2px solid #e0e0e0;
    }
    .preview-item svg {
      width: 80px;
      height: 80px;
    }
    .preview-item p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #666;
    }
    
    .animal-levels {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin: 20px 0;
      padding: 20px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 15px;
    }
    .animal-levels svg {
      width: 100px;
      height: 100px;
    }
    .arrow {
      font-size: 48px;
      color: white;
    }
    
    #log {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-item {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #667eea;
      padding-left: 10px;
    }
    .success { border-left-color: #28a745; color: #28a745; }
    .error { border-left-color: #dc3545; color: #dc3545; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎨 生成项目图片素材</h1>
    <p>一键生成所有需要的 SVG 图片，无需下载外部资源！</p>
    
    <button class="btn btn-primary" onclick="downloadAll()">📥 下载所有图片</button>
    <button class="btn btn-success" onclick="downloadAnimals()">🐣 下载动物等级图 (5 张)</button>
    <button class="btn btn-success" onclick="downloadWords()">📖 下载单词图片 (50 张)</button>
  </div>
  
  <div class="card">
    <h2>🐣 动物等级图预览</h2>
    <div class="animal-levels" id="animal-levels-preview">
      <!-- 动态生成 -->
    </div>
  </div>
  
  <div class="card">
    <h2>📖 单词图片预览 (部分)</h2>
    <div class="preview-grid" id="word-preview">
      <!-- 动态生成 -->
    </div>
  </div>
  
  <div class="card">
    <h2>📋 生成日志</h2>
    <div id="log">点击按钮开始生成...</div>
  </div>

  <script>
    const logDiv = document.getElementById('log');
    
    function log(msg, type = 'info') {
      const className = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
      logDiv.innerHTML += `<div class="log-item ${className}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }
    
    // ========== SVG 图标定义 ==========
    
    // 动物等级图标
    const animalSVGs = {
      egg: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="30" ry="40" fill="#FFE4B5" stroke="#DEB887" stroke-width="3"/>
        <ellipse cx="40" cy="45" rx="8" ry="12" fill="#FFF8DC" opacity="0.6"/>
        <ellipse cx="60" cy="60" rx="6" ry="10" fill="#FFF8DC" opacity="0.4"/>
      </svg>`,
      
      chick: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="35" fill="#FFD700"/>
        <circle cx="50" cy="50" r="30" fill="#FFEC8B"/>
        <circle cx="38" cy="42" r="5" fill="#333"/>
        <circle cx="62" cy="42" r="5" fill="#333"/>
        <circle cx="40" cy="40" r="2" fill="#FFF"/>
        <circle cx="62" cy="40" r="2" fill="#FFF"/>
        <polygon points="50,50 45,58 55,58" fill="#FF6B6B"/>
        <path d="M 35 65 Q 50 75 65 65" stroke="#FF6B6B" stroke-width="3" fill="none"/>
        <ellipse cx="20" cy="50" rx="8" ry="5" fill="#FFD700"/>
        <ellipse cx="80" cy="50" rx="8" ry="5" fill="#FFD700"/>
      </svg>`,
      
      bird: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="35" ry="30" fill="#87CEEB"/>
        <ellipse cx="50" cy="55" rx="30" ry="25" fill="#B0E0E6"/>
        <circle cx="35" cy="45" r="6" fill="#333"/>
        <circle cx="65" cy="45" r="6" fill="#333"/>
        <circle cx="37" cy="43" r="2" fill="#FFF"/>
        <circle cx="67" cy="43" r="2" fill="#FFF"/>
        <polygon points="50,52 45,62 55,62" fill="#FFA500"/>
        <path d="M 35 68 Q 50 78 65 68" stroke="#FF6B6B" stroke-width="3" fill="none"/>
        <ellipse cx="15" cy="55" rx="12" ry="8" fill="#87CEEB"/>
        <ellipse cx="85" cy="55" rx="12" ry="8" fill="#87CEEB"/>
        <ellipse cx="50" cy="25" rx="8" ry="12" fill="#87CEEB"/>
      </svg>`,
      
      bigbird: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="40" ry="35" fill="#9370DB"/>
        <ellipse cx="50" cy="55" rx="35" ry="30" fill="#BA55D3"/>
        <circle cx="35" cy="45" r="7" fill="#333"/>
        <circle cx="65" cy="45" r="7" fill="#333"/>
        <circle cx="37" cy="43" r="2.5" fill="#FFF"/>
        <circle cx="67" cy="43" r="2.5" fill="#FFF"/>
        <polygon points="50,52 43,65 57,65" fill="#FFA500"/>
        <path d="M 30 70 Q 50 82 70 70" stroke="#FF69B4" stroke-width="4" fill="none"/>
        <ellipse cx="10" cy="55" rx="15" ry="10" fill="#9370DB"/>
        <ellipse cx="90" cy="55" rx="15" ry="10" fill="#9370DB"/>
        <path d="M 35 25 Q 50 10 65 25" stroke="#9370DB" stroke-width="8" fill="none"/>
        <circle cx="50" cy="15" r="5" fill="#FFD700"/>
      </svg>`,
      
      phoenix: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="42" ry="38" fill="#FF4500"/>
        <ellipse cx="50" cy="55" rx="37" ry="33" fill="#FF6347"/>
        <circle cx="35" cy="45" r="8" fill="#333"/>
        <circle cx="65" cy="45" r="8" fill="#333"/>
        <circle cx="37" cy="43" r="3" fill="#FFF"/>
        <circle cx="67" cy="43" r="3" fill="#FFF"/>
        <polygon points="50,50 42,68 58,68" fill="#FFD700"/>
        <path d="M 25 72 Q 50 88 75 72" stroke="#FFD700" stroke-width="4" fill="none"/>
        <ellipse cx="5" cy="55" rx="18" ry="12" fill="#FF4500"/>
        <ellipse cx="95" cy="55" rx="18" ry="12" fill="#FF4500"/>
        <path d="M 30 22 Q 50 5 70 22" stroke="#FF4500" stroke-width="10" fill="none"/>
        <circle cx="50" cy="10" r="8" fill="#FFD700"/>
        <ellipse cx="50" cy="90" rx="20" ry="8" fill="#FF6347"/>
      </svg>`
    };
    
    // 单词图片生成器
    function generateWordSVG(word, category) {
      const colors = {
        animals: ['#FFD700', '#87CEEB', '#98FB98', '#FFB6C1', '#DDA0DD'],
        colors: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
        numbers: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
        family: ['#FFB6C1', '#87CEEB', '#98FB98', '#FFD700', '#DDA0DD'],
        objects: ['#A0A0A0', '#8B4513', '#4682B4', '#32CD32', '#FF6347']
      };
      
      const color = colors[category] ? colors[category][word.length % 5] : '#667eea';
      
      // 首字母大写
      const firstLetter = word.charAt(0).toUpperCase();
      
      return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" rx="20" fill="${color}20"/>
        <circle cx="100" cy="80" r="50" fill="${color}"/>
        <text x="100" y="100" text-anchor="middle" fill="white" font-size="60" font-weight="bold" font-family="Arial">${firstLetter}</text>
        <text x="100" y="160" text-anchor="middle" fill="#333" font-size="28" font-weight="bold" font-family="Arial">${word}</text>
      </svg>`;
    }
    
    // 单词列表
    const words = {
      animals: ['cat', 'dog', 'bird', 'fish', 'rabbit', 'duck', 'pig', 'cow', 'horse', 'sheep'],
      colors: ['red', 'blue', 'green', 'yellow', 'orange', 'purple', 'pink', 'black', 'white', 'brown'],
      numbers: ['one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine', 'ten'],
      family: ['mom', 'dad', 'grandma', 'grandpa', 'sister', 'brother', 'baby', 'family', 'uncle', 'aunt'],
      objects: ['ball', 'book', 'pencil', 'bag', 'cup', 'chair', 'table', 'bed', 'door', 'window']
    };
    
    // ========== 预览渲染 ==========
    
    function renderAnimalLevels() {
      const container = document.getElementById('animal-levels-preview');
      const names = ['egg', 'chick', 'bird', 'bigbird', 'phoenix'];
      const labels = ['蛋', '雏鸟', '小鸟', '大鸟', '凤凰'];
      
      container.innerHTML = names.map((name, i) => `
        <div style="text-align:center;color:white;">
          ${animalSVGs[name]}
          <div style="margin-top:10px;font-weight:bold;">${labels[i]}</div>
        </div>
      ` + (i < 4 ? '<div class="arrow">→</div>' : '')).join('');
    }
    
    function renderWordPreview() {
      const container = document.getElementById('word-preview');
      let previewWords = [];
      
      // 每个分类选前 3 个
      Object.keys(words).forEach(cat => {
        previewWords.push(...words[cat].slice(0, 3).map(w => ({word: w, category: cat})));
      });
      
      container.innerHTML = previewWords.map(({word, category}) => `
        <div class="preview-item">
          ${generateWordSVG(word, category)}
          <p>${word}</p>
        </div>
      `).join('');
    }
    
    // ========== 下载功能 ==========
    
    function downloadSVG(filename, svgContent) {
      const blob = new Blob([svgContent], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      log(`✅ 下载：${filename}`, 'success');
    }
    
    function downloadAnimals() {
      log('开始下载动物等级图...');
      Object.keys(animalSVGs).forEach(name => {
        downloadSVG(`${name}.png`, animalSVGs[name]);
      });
      log('✅ 动物等级图下载完成！', 'success');
    }
    
    function downloadWords() {
      log('开始下载单词图片...');
      let count = 0;
      
      Object.keys(words).forEach(category => {
        words[category].forEach(word => {
          const svg = generateWordSVG(word, category);
          downloadSVG(`${word}.png`, svg);
          count++;
        });
      });
      
      log(`✅ 单词图片下载完成！共 ${count} 张`, 'success');
    }
    
    function downloadAll() {
      log('开始下载所有图片...');
      downloadAnimals();
      setTimeout(() => downloadWords(), 1000);
    }
    
    // ========== 初始化 ==========
    
    window.addEventListener('load', function() {
      log('页面加载完成');
      renderAnimalLevels();
      renderWordPreview();
      log('✅ 预览已生成');
      log('💡 点击下载按钮保存 SVG 文件');
      log('💡 保存后放入 images/ 文件夹即可使用');
    });
  </script>
</body>
</html>
